<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Facts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <!-- Start screen -->
    <section id="start-screen" class="screen">
      <h1>Math Facts</h1>
      <p class="subtitle">Beat the clock</p>

      <label class="field">
        <span>Category</span>
        <select id="category">
          <option value="multiplication" selected>Multiplication</option>
          <option value="fractionToDecimal">Fraction &rarr; Decimal</option>
          <option value="decimalToFraction">Decimal &rarr; Fraction</option>
          <option value="mixed">Mixed</option>
        </select>
      </label>

      <label class="field">
        <span>Time limit</span>
        <select id="time-limit">
          <option value="1">1 minute</option>
          <option value="2" selected>2 minutes</option>
          <option value="3">3 minutes</option>
          <option value="5">5 minutes</option>
          <option value="10">10 minutes</option>
        </select>
      </label>

      <button id="start-btn" class="btn">Start</button>
    </section>

    <!-- Quiz screen -->
    <section id="quiz-screen" class="screen hidden">
      <div class="hud">
        <span id="timer" class="timer">2:00</span>
        <span class="correct-label">Correct: <span id="correct-count">0</span></span>
      </div>

      <div class="problem-card">
        <div id="problem" class="problem"></div>
        <input
          id="answer-input"
          type="text"
          inputmode="text"
          autocomplete="off"
          placeholder="?"
        />
        <div id="hint" class="hint"></div>
      </div>
    </section>

    <!-- Results screen -->
    <section id="results-screen" class="screen hidden">
      <h1>Time's up!</h1>
      <div class="results">
        <div class="result-row">
          <span class="result-label">Correct</span>
          <span id="result-correct" class="result-value"></span>
        </div>
        <div class="result-row">
          <span class="result-label">Missed</span>
          <span id="result-missed" class="result-value"></span>
        </div>
      </div>
      <button id="retry-btn" class="btn">Play Again</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
